<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <!-- Градиент для фона кнопки -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0000" />
      <stop offset="100%" stop-color="#B30000" />
    </linearGradient>
    
    <!-- Тень для создания объема -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    
    <!-- Стили для анимации при наведении -->
    <style>
      .interactive-button {
        cursor: pointer;
      }
      .button-bg {
        transition: transform 0.2s ease, fill 0.2s ease;
      }
      .interactive-button:hover .button-bg {
        transform: scale(1.02);
        fill: url(#btnGradHover);
      }
      .interactive-button:active .button-bg {
        transform: scale(0.98);
      }
      .play-icon, .btn-text {
        transition: transform 0.2s ease;
        pointer-events: none; /* Чтобы ховер обрабатывался только базой */
      }
      .interactive-button:hover .play-icon {
        transform: translate(22px, 18px) scale(1.05);
      }
    </style>
    
    <!-- Градиент при наведении -->
    <linearGradient id="btnGradHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3333" />
      <stop offset="100%" stop-color="#CC0000" />
    </linearGradient>
  </defs>

  <!-- Ссылка на YouTube видео встроенная в SVG -->
  <a xlink:href="https://www.youtube.com/watch?v=sajPuWi567w" target="_blank" class="interactive-button" rel="noopener noreferrer">
    <!-- Фоновая подложка кнопки с закругленными углами и тенью -->
    <rect class="button-bg" x="5" y="5" width="230" height="50" rx="25" fill="url(#btnGrad)" filter="url(#dropShadow)" transform-origin="120 30" />
    
    <!-- Иконка Play (YouTube стиль) -->
    <g class="play-icon" transform="translate(22, 18)" transform-origin="12 12">
      <!-- Белый круглый фон под иконку -->
      <circle cx="12" cy="12" r="12" fill="#FFFFFF" />
      <!-- Красный треугольник (плей) -->
      <polygon points="10,8 16,12 10,16" fill="#FF0000" />
    </g>
    
    <!-- Текст кнопки -->
    <text class="btn-text" x="142" y="35" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      Смотреть на YouTube
    </text>
  </a>
</svg>
